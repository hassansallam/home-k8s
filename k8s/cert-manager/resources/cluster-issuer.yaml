apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-ca
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: k8s-ca
spec:
  ca:
    secretName: k8s-ca-key-pair
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: k8s-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: k8s-ca
  secretName: k8s-ca-key-pair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-ca
    kind: ClusterIssuer
    group: cert-manager.io

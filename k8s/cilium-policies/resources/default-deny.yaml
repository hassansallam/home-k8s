# Baseline Cilium Network Policy
# Activates ingress enforcement with a permissive allow-list.
# Only ingress from outside the 192.168.122.0/24 NAT network is denied.
# Egress is NOT enforced (all egress allowed by default).
#
# To tighten: add per-namespace CiliumNetworkPolicies that restrict
# ingress/egress for specific workloads.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-cluster-ingress
spec:
  description: "Allow ingress from all cluster entities and local network"
  endpointSelector: {}
  ingress:
    - fromEntities:
        - cluster
        - host
        - remote-node
        - kube-apiserver
        - health
        - init
    - fromCIDR:
        - 192.168.122.0/24

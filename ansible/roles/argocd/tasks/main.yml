---
- name: Create argocd namespace
  command: kubectl create namespace argocd
  register: ns_result
  changed_when: ns_result.rc == 0
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

- name: Apply ArgoCD install manifest
  command: >
    kubectl apply -n argocd --server-side --force-conflicts
    -f https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml
  changed_when: true

- name: Throttle ArgoCD to sync one app at a time
  command: >
    kubectl patch configmap argocd-cmd-params-cm -n argocd
    --type merge -p '{"data":{"controller.operation.processors":"1","controller.status.processors":"5"}}'
  changed_when: true

- name: Increase ArgoCD repo-server and controller resources
  command: "{{ item }}"
  loop:
    - >
      kubectl patch deployment argocd-repo-server -n argocd --type json
      -p '[{"op":"replace","path":"/spec/template/spec/containers/0/resources","value":{"requests":{"cpu":"250m","memory":"512Mi"},"limits":{"memory":"1Gi"}}},{"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/timeoutSeconds","value":30},{"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/timeoutSeconds","value":30}]'
    - >
      kubectl patch statefulset argocd-application-controller -n argocd --type json
      -p '[{"op":"replace","path":"/spec/template/spec/containers/0/resources","value":{"requests":{"cpu":"500m","memory":"512Mi"},"limits":{"memory":"2Gi"}}},{"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/timeoutSeconds","value":30},{"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/failureThreshold","value":30}]'
  changed_when: true

- name: Wait for argocd-server deployment to be available
  command: >
    kubectl wait --for=condition=Available
    deployment/argocd-server
    -n argocd
    --timeout=300s
  changed_when: false
  retries: 5
  delay: 15
  register: argocd_ready
  until: argocd_ready.rc == 0

- name: Check if app-of-apps manifest exists
  stat:
    path: "{{ playbook_dir }}/../../k8s/argocd/apps/app-of-apps.yaml"
  register: app_of_apps_manifest

- name: Apply app-of-apps manifest
  command: >
    kubectl apply -f {{ playbook_dir }}/../../k8s/argocd/apps/app-of-apps.yaml
  when: app_of_apps_manifest.stat.exists
  changed_when: true


---
- name: Apply Talos config to controlplane nodes
  command: >
    talosctl apply-config
    --nodes {{ hostvars[item]['node_ip'] }}
    --file {{ talos_config_dir }}/{{ item }}.yaml
    --insecure
  loop: "{{ groups['controlplane'] }}"
  delegate_to: localhost
  changed_when: true

- name: Wait between controlplane and worker applies
  pause:
    seconds: 5

- name: Apply Talos config to worker nodes
  command: >
    talosctl apply-config
    --nodes {{ hostvars[item]['node_ip'] }}
    --file {{ talos_config_dir }}/{{ item }}.yaml
    --insecure
  loop: "{{ groups['workers'] }}"
  delegate_to: localhost
  changed_when: true
